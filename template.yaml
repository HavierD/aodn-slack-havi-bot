AWSTemplateFormatVersion: 2010-09-09
Description: >-
  aodn-slack-havi-bot
Transform:
- AWS::Serverless-2016-10-31

Parameters:
  SlackBotToken:
    Type: String
    Description: Slack Bot OAuth Token (xoxb-...)
    NoEcho: true
  SlackClientId:
    Type: String
    Description: Slack App Client ID (from Basic Information page)
  SlackClientSecret:
    Type: String
    Description: Slack App Client Secret (from Basic Information page)
    NoEcho: true
  OAuthRedirectUri:
    Type: String
    Description: "Full HTTPS URL for the OAuth callback, e.g. https://xxx.execute-api.ap-southeast-2.amazonaws.com/Prod/slack/oauth/callback"
  Environment:
    Type: String
    Description: Deployment environment
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

# Resources declares the AWS resources that you want to include in the stack
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html
Resources:
  # API Gateway
  HavibotApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: Prod
      Description: HTTP API for AODN Slack Havi Bot
      Tags:
        Project: aodn-slack-havi-bot
        Environment: !Ref Environment
        ManagedBy: SAM
        Team: AODN
        Application: HaviBot
        AutoOff: "False"

  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: get-all-items.js
  getAllItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-all-items.getAllItemsHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP get method to get all items 
        from a DynamoDB table.
      Policies:
        # Give Create/Read/Update/Delete Permissions to the HavibotEventsTable
      - DynamoDBCrudPolicy:
          TableName: !Ref HavibotEventsTable
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          SAMPLE_TABLE: !Ref HavibotEventsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HavibotApi
            Path: /
            Method: GET
  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: get-by-id.js
  getByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-by-id.getByIdHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP get method to get one item 
        by id from a DynamoDB table.
      Policies:
        # Give Create/Read/Update/Delete Permissions to the HavibotEventsTable
      - DynamoDBCrudPolicy:
          TableName: !Ref HavibotEventsTable
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          SAMPLE_TABLE: !Ref HavibotEventsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HavibotApi
            Path: /{id}
            Method: GET
  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: put-item.js
  putItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/put-item.putItemHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP post method to add one item 
        to a DynamoDB table.
      Policies:
        # Give Create/Read/Update/Delete Permissions to the HavibotEventsTable
      - DynamoDBCrudPolicy:
          TableName: !Ref HavibotEventsTable
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          SAMPLE_TABLE: !Ref HavibotEventsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HavibotApi
            Path: /
            Method: POST
  # Simple syntax to create a DynamoDB table with a single attribute primary key, more in
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlesssimpletable

  # Slack Events API handler
  slackEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/slack-events.slackEventsHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Handles Slack Events API requests including app_home_opened and interactivity
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HavibotEventsTable
        - DynamoDBReadPolicy:
            TableName: !Ref HavibotUserTokensTable
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          SLACK_CLIENT_ID: !Ref SlackClientId
          OAUTH_REDIRECT_URI: !Ref OAuthRedirectUri
          SAMPLE_TABLE: !Ref HavibotEventsTable
          USER_TOKEN_TABLE: !Ref HavibotUserTokensTable
      Events:
        SlackEvents:
          Type: HttpApi
          Properties:
            ApiId: !Ref HavibotApi
            Path: /slack/events
            Method: POST

  processScheduleFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/process-schedule.processScheduleHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 60
      Description: "Process scheduled events using GSIs (queries by start/end date/time)"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HavibotEventsTable
        - DynamoDBReadPolicy:
            TableName: !Ref HavibotUserTokensTable
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          SAMPLE_TABLE: !Ref HavibotEventsTable
          USER_TOKEN_TABLE: !Ref HavibotUserTokensTable

  # DynamoDB table to store item: {id: &lt;ID&gt;, name: &lt;NAME&gt;}
  HavibotEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: aodn-slack-havibot-events
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: startDate
          AttributeType: S
        - AttributeName: startTime
          AttributeType: S
        - AttributeName: endDate
          AttributeType: S
        - AttributeName: endTime
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      GlobalSecondaryIndexes:
        - IndexName: UserIdStartDateIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: startDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
        - IndexName: StartDateStartTimeIndex
          KeySchema:
            - AttributeName: startDate
              KeyType: HASH
            - AttributeName: startTime
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
        - IndexName: EndDateEndTimeIndex
          KeySchema:
            - AttributeName: endDate
              KeyType: HASH
            - AttributeName: endTime
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
      Tags:
        - Key: Project
          Value: aodn-slack-havi-bot
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: SAM
        - Key: Team
          Value: AODN
        - Key: Application
          Value: HaviBot
        - Key: AutoOff
          Value: "False"

  # Slack OAuth callback handler — exchanges code for per-user xoxp- token
  slackOAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/slack-oauth.slackOAuthHandler
      Runtime: nodejs22.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Handles Slack OAuth 2.0 callback and stores per-user tokens
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HavibotUserTokensTable
      Environment:
        Variables:
          SLACK_CLIENT_ID: !Ref SlackClientId
          SLACK_CLIENT_SECRET: !Ref SlackClientSecret
          OAUTH_REDIRECT_URI: !Ref OAuthRedirectUri
          USER_TOKEN_TABLE: !Ref HavibotUserTokensTable
      Events:
        OAuthCallback:
          Type: HttpApi
          Properties:
            ApiId: !Ref HavibotApi
            Path: /slack/oauth/callback
            Method: GET

  # DynamoDB table to store per-user OAuth tokens (xoxp-)
  HavibotUserTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: aodn-slack-havibot-user-tokens
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      Tags:
        - Key: Project
          Value: aodn-slack-havi-bot
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: SAM
        - Key: Team
          Value: AODN
        - Key: Application
          Value: HaviBot
        - Key: AutoOff
          Value: "False"

Outputs:
  WebEndpoint:
    Description: API Gateway endpoint URL for Prod stage
    Value: !Sub "https://${HavibotApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/"
# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    LoggingConfig:
      LogFormat: JSON
    Tags:
      Project: aodn-slack-havi-bot
      Environment: !Ref Environment
      ManagedBy: SAM
      Team: AODN
      Application: HaviBot
      AutoOff: "False"
